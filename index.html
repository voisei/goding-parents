<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>은성 B컷 아카이브</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gothic+A1:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

<style>
  :root{
    --bg:#e8ecef;
    --card:#ffffff;
    --ink:#26323f;
    --muted:#6b7883;
    --line:#d3d9de;
    --rose:#d97a8c;
    --rose-deep:#a84f61;
    --film:#26323f;
    --shadow:0 6px 22px rgba(38,50,63,.10);
    --thumb-ratio: 4 / 5;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Gothic A1', sans-serif;
    -webkit-font-smoothing:antialiased;
    padding:0 0 4rem;
  }

  .wrap{ max-width:1200px; margin:0 auto; padding:0 24px; }

  header{ padding:44px 0 0; }

  .eyebrow{
    font-family:'Space Mono', monospace;
    font-size:12px;
    letter-spacing:.28em;
    color:var(--rose-deep);
    text-transform:uppercase;
    margin-bottom:12px;
  }

  .head-row{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:24px;
    flex-wrap:wrap;
  }

  h1{
    font-family:'Gowun Batang', serif;
    font-size:40px;
    font-weight:700;
    line-height:1.15;
    letter-spacing:-.01em;
  }

  h1 .accent{ color:var(--rose-deep); }

  .sub{
    color:var(--muted);
    font-size:15px;
    margin-top:10px;
    max-width:44ch;
    line-height:1.6;
  }

  .count{
    font-family:'Space Mono', monospace;
    font-size:13px;
    letter-spacing:.12em;
    color:var(--muted);
    white-space:nowrap;
    padding-bottom:6px;
  }

  .count b{
    color:var(--ink);
    font-size:26px;
  }

  .filmstrip{
    position:relative;
    height:26px;
    margin:26px 0 30px;
    background:var(--film);
    border-radius:3px;
  }

  .filmstrip::before,
  .filmstrip::after{
    content:"";
    position:absolute;
    left:6px;
    right:6px;
    height:6px;
    background-image:repeating-linear-gradient(
      to right,
      var(--bg) 0 8px,
      transparent 8px 16px
    );
    border-radius:2px;
  }

  .filmstrip::before{ top:5px; }
  .filmstrip::after{ bottom:5px; }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(180px, 1fr));
    gap:16px;
  }

  .frame{
    position:relative;
    display:block;
    width:100%;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    padding:0;
    text-align:left;
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }

  .frame:hover,
  .frame:focus-visible{
    transform:translateY(-4px);
    box-shadow:var(--shadow);
    border-color:var(--rose);
    outline:none;
  }

  .frame:focus-visible{
    box-shadow:0 0 0 3px rgba(217,122,140,.35);
  }

  .thumb{
    position:relative;
    width:100%;
    aspect-ratio:var(--thumb-ratio);
    background:#eef1f3;
    overflow:hidden;
  }

  .thumb img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .num{
    position:absolute;
    top:8px;
    left:8px;
    z-index:2;
    font-family:'Space Mono', monospace;
    font-size:11px;
    font-weight:700;
    color:#fff;
    background:rgba(38,50,63,.72);
    padding:3px 8px;
    border-radius:6px;
    letter-spacing:.05em;
  }

  .cap{
    padding:9px 12px 11px;
    font-size:13px;
    color:var(--ink);
    font-weight:500;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
  }

  .cap .tag{
    font-family:'Space Mono', monospace;
    font-size:11px;
    color:var(--muted);
  }

  .thumb.missing{
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:6px;
    background:#f3f0f1;
    color:var(--rose-deep);
    text-align:center;
    padding:12px;
  }

  .thumb.missing span{
    font-size:12px;
    line-height:1.4;
  }

  .thumb.missing .mi{
    font-size:22px;
  }

  .lb{
    position:fixed;
    inset:0;
    z-index:50;
    background:rgba(20,24,28,.94);
    display:none;
    align-items:center;
    justify-content:center;
    padding:28px;
  }

  .lb.open{ display:flex; }

  .lb img{
    max-width:100%;
    max-height:82vh;
    object-fit:contain;
    border-radius:6px;
    box-shadow:0 20px 60px rgba(0,0,0,.5);
  }

  .lb-cap{
    position:absolute;
    bottom:22px;
    left:0;
    right:0;
    text-align:center;
    color:#e8ecef;
  }

  .lb-cap .name{
    font-family:'Gothic A1', sans-serif;
    font-size:15px;
    font-weight:500;
  }

  .lb-cap .idx{
    font-family:'Space Mono', monospace;
    font-size:12px;
    color:#9aa6b0;
    margin-top:4px;
    letter-spacing:.1em;
  }

  .lb-btn{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:52px;
    height:52px;
    border-radius:50%;
    background:rgba(255,255,255,.10);
    border:1px solid rgba(255,255,255,.22);
    color:#fff;
    font-size:24px;
    cursor:pointer;
    line-height:1;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:background .15s ease;
  }

  .lb-btn:hover{
    background:rgba(217,122,140,.55);
  }

  .lb-prev{ left:20px; }
  .lb-next{ right:20px; }

  .lb-close{
    position:absolute;
    top:20px;
    right:22px;
    width:44px;
    height:44px;
    border-radius:50%;
    background:rgba(255,255,255,.10);
    border:1px solid rgba(255,255,255,.22);
    color:#fff;
    font-size:22px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:background .15s ease;
  }

  .lb-close:hover{
    background:rgba(217,122,140,.55);
  }

  @media (max-width:560px){
    h1{ font-size:30px; }
    .grid{
      grid-template-columns:repeat(auto-fill, minmax(140px, 1fr));
      gap:12px;
    }
    .lb-btn{
      width:44px;
      height:44px;
      font-size:20px;
    }
  }

  @media (prefers-reduced-motion:reduce){
    .frame{ transition:none; }
  }
</style>
</head>

<body>
  <div class="wrap">
    <header>
      <div class="eyebrow">Behind the cut · 비하인드 컷</div>

      <div class="head-row">
        <div>
          <h1>은성 <span class="accent">B컷</span> 아카이브</h1>
          <p class="sub">
            플레이 중엔 등장하지 않는, 아껴둔 은성이의 비하인드 컷 모음이에요.
            사진을 누르면 크게 볼 수 있어요.
          </p>
        </div>

        <div class="count">
          <b id="countNum">0</b> CUTS
        </div>
      </div>
    </header>

    <div class="filmstrip" aria-hidden="true"></div>

    <main class="grid" id="grid" aria-label="은성 B컷 갤러리"></main>
  </div>

  <div class="lb" id="lb" role="dialog" aria-modal="true" aria-label="확대 보기">
    <button class="lb-close" id="lbClose" aria-label="닫기">✕</button>
    <button class="lb-btn lb-prev" id="lbPrev" aria-label="이전 사진">‹</button>
    <img id="lbImg" alt="" />
    <button class="lb-btn lb-next" id="lbNext" aria-label="다음 사진">›</button>

    <div class="lb-cap">
      <div class="name" id="lbName"></div>
      <div class="idx" id="lbIdx"></div>
    </div>
  </div>

<script>
  const CONFIG = {
    folder: "",
    prefix: "은성_",
    ext: "jpeg",
    count: 56
  };

  const items = Array.from({ length: CONFIG.count }, (_, i) => {
    const n = i + 1;

    return {
      n,
      label: CONFIG.prefix + n,
      src: CONFIG.folder + CONFIG.prefix + n + "." + CONFIG.ext
    };
  });

  const pad = n => String(n).padStart(2, "0");

  const grid = document.getElementById("grid");
  const countNum = document.getElementById("countNum");

  countNum.textContent = items.length;

  items.forEach((item, i) => {
    const card = document.createElement("button");
    card.className = "frame";
    card.setAttribute("aria-label", item.label + " 크게 보기");

    card.innerHTML = `
      <div class="thumb">
        <span class="num">#${pad(item.n)}</span>
        <img src="${item.src}" alt="${item.label}" loading="lazy" />
      </div>
      <div class="cap">
        <span>${item.label}</span>
        <span class="tag">B컷</span>
      </div>
    `;

    card.addEventListener("click", () => openLB(i));

    const img = card.querySelector("img");

    img.addEventListener("error", () => {
      const thumb = card.querySelector(".thumb");
      thumb.classList.add("missing");
      thumb.innerHTML = `
        <span class="num">#${pad(item.n)}</span>
        <div class="mi">🖼️</div>
        <span>이미지 없음<br>${item.label}.${CONFIG.ext}</span>
      `;
    });

    grid.appendChild(card);
  });

  const lb = document.getElementById("lb");
  const lbImg = document.getElementById("lbImg");
  const lbName = document.getElementById("lbName");
  const lbIdx = document.getElementById("lbIdx");

  let cur = 0;

  function openLB(i){
    cur = i;
    render();
    lb.classList.add("open");
    document.body.style.overflow = "hidden";
    document.getElementById("lbClose").focus();
  }

  function closeLB(){
    lb.classList.remove("open");
    document.body.style.overflow = "";
  }

  function step(d){
    cur = (cur + d + items.length) % items.length;
    render();
  }

  function render(){
    const it = items[cur];

    lbImg.src = it.src;
    lbImg.alt = it.label;
    lbName.textContent = it.label;
    lbIdx.textContent = pad(it.n) + " / " + pad(items.length);
  }

  document.getElementById("lbClose").addEventListener("click", closeLB);
  document.getElementById("lbPrev").addEventListener("click", () => step(-1));
  document.getElementById("lbNext").addEventListener("click", () => step(1));

  lb.addEventListener("click", e => {
    if (e.target === lb) closeLB();
  });

  document.addEventListener("keydown", e => {
    if (!lb.classList.contains("open")) return;

    if (e.key === "Escape") closeLB();
    else if (e.key === "ArrowLeft") step(-1);
    else if (e.key === "ArrowRight") step(1);
  });
</script>
</body>
</html>
